<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Forgot Password — Quoridor</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css?v=1.0.2" type="text/css" />
    <link rel="stylesheet" href="/css/auth.css?v=1.0.2" type="text/css" />
    <link rel="stylesheet" href="/css/auth-pages.css?v=1.0.2" type="text/css" />
</head>
<body class="auth-page-body">
    <header class="main-header">
        <div class="header-left">
            <a href="/" class="header-logo">QUORIDOR</a>
        </div>
        <div class="header-right">
            <select id="headerLang" class="header-lang" onchange="setLanguage(this.value)">
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
        </div>
    </header>

    <div class="auth-page-container">
        <div class="auth-form-wrapper">
            <button class="close-panel-btn" onclick="window.location.href='/login'">&times;</button>
            <h1 id="pageTitle">Forgot Password</h1>
            <div id="authError" class="auth-error"></div>
            <div id="successMessage" class="auth-success" style="display:none"></div>
            <form class="auth-form" id="forgotForm" onsubmit="submitForgot(event)" novalidate>
                <div class="field-group">
                    <label class="field-label" id="emailLabel" for="email">Email</label>
                    <input type="email" id="email" autocomplete="email" required />
                    <div id="emailError" class="field-error"></div>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>
            </form>
            <div class="auth-footer-links">
                <span id="footerText">Remember your password?</span>
                <a href="/login" id="footerLink">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        var dict = {
            ru: {
                title: 'Восстановление пароля',
                email_label: 'Email',
                submit: 'Отправить ссылку',
                footer: 'Вспомнили пароль?',
                footer_link: 'Вернуться к входу',
                error_email_empty: 'Введите email',
                error_email_invalid: 'Некорректный email',
                success: 'Если этот email зарегистрирован, мы отправили ссылку для сброса пароля.',
                error_network: 'Ошибка сети',
                page_title: 'Восстановление пароля — Quoridor',
            },
            en: {
                title: 'Forgot Password',
                email_label: 'Email',
                submit: 'Send Reset Link',
                footer: 'Remember your password?',
                footer_link: 'Back to Login',
                error_email_empty: 'Please enter your email',
                error_email_invalid: 'Invalid email format',
                success: 'If that email is registered, a reset link has been sent.',
                error_network: 'Network error',
                page_title: 'Forgot Password — Quoridor',
            }
        };

        function getLang() {
            return localStorage.getItem('quoridor-lang') || 'en';
        }

        function setLanguage(lang) {
            localStorage.setItem('quoridor-lang', lang);
            var d = dict[lang];
            if (!d) return;
            document.title = d.page_title;
            document.documentElement.lang = lang;
            var el = document.getElementById('headerLang');
            if (el) el.value = lang;
            setText('pageTitle', d.title);
            setText('emailLabel', d.email_label);
            setText('submitBtn', d.submit);
            setText('footerText', d.footer);
            setText('footerLink', d.footer_link);
        }

        function setText(id, text) {
            var el = document.getElementById(id);
            if (el) el.textContent = text;
        }

        function applyLang() {
            setLanguage(getLang());
        }

        function clearErrors() {
            document.querySelectorAll('.field-error').forEach(function(el) {
                el.classList.remove('visible');
                el.textContent = '';
            });
            document.querySelectorAll('.field-group input').forEach(function(el) {
                el.classList.remove('input-error');
            });
            var ae = document.getElementById('authError');
            ae.classList.remove('visible');
            ae.textContent = '';
        }

        function showFieldError(inputId, msg) {
            var input = document.getElementById(inputId);
            if (input) input.classList.add('input-error');
            var errEl = document.getElementById(inputId + 'Error');
            if (errEl) {
                errEl.textContent = msg;
                errEl.classList.add('visible');
            }
        }

        function showGlobalError(msg) {
            var el = document.getElementById('authError');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function submitForgot(e) {
            e.preventDefault();
            clearErrors();
            var lang = getLang();
            var d = dict[lang];
            var email = document.getElementById('email').value.trim();
            if (!email) {
                showFieldError('email', d.error_email_empty);
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showFieldError('email', d.error_email_invalid);
                return;
            }
            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '...';

            fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    showGlobalError(data.error);
                    btn.disabled = false;
                    btn.textContent = d.submit;
                } else {
                    document.getElementById('forgotForm').style.display = 'none';
                    var sm = document.getElementById('successMessage');
                    sm.textContent = d.success;
                    sm.style.display = 'block';
                }
            })
            .catch(function() {
                showGlobalError(d.error_network);
                btn.disabled = false;
                btn.textContent = d.submit;
            });
        }

        applyLang();
    </script>
</body>
</html>
