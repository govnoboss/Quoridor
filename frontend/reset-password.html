<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Reset Password — Quoridor</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/css/style.css?v=1.0.2" type="text/css" />
    <link rel="stylesheet" href="/css/auth.css?v=1.0.2" type="text/css" />
    <link rel="stylesheet" href="/css/auth-pages.css?v=1.0.2" type="text/css" />
</head>
<body class="auth-page-body">
    <header class="main-header">
        <div class="header-left">
            <a href="/" class="header-logo">QUORIDOR</a>
        </div>
        <div class="header-right">
            <select id="headerLang" class="header-lang" onchange="setLanguage(this.value)">
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
        </div>
    </header>

    <div class="auth-page-container">
        <div class="auth-form-wrapper">
            <button class="close-panel-btn" onclick="window.location.href='/login'">&times;</button>
            <h1 id="pageTitle">Reset Password</h1>
            <div id="authError" class="auth-error"></div>
            <div id="successMessage" class="auth-success" style="display:none"></div>
            <form class="auth-form" id="resetForm" onsubmit="submitReset(event)" novalidate>
                <div class="field-group">
                    <label class="field-label" id="passwordLabel" for="password">New Password</label>
                    <input type="password" id="password" autocomplete="new-password" required minlength="8" />
                    <div id="passwordError" class="field-error"></div>
                </div>
                <div class="field-group">
                    <label class="field-label" id="confirmLabel" for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" autocomplete="new-password" required />
                    <div id="confirmError" class="field-error"></div>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">Reset Password</button>
            </form>
            <div class="auth-footer-links">
                <span id="footerText">Back to</span>
                <a href="/login" id="footerLink">Login</a>
            </div>
        </div>
    </div>

    <script>
        var dict = {
            ru: {
                title: 'Сброс пароля',
                password_label: 'Новый пароль',
                confirm_label: 'Подтвердите пароль',
                submit: 'Сбросить пароль',
                footer: 'Вернуться ко',
                footer_link: 'Входу',
                error_password_empty: 'Введите пароль',
                error_password_length: 'Минимум 8 символов',
                error_confirm_empty: 'Подтвердите пароль',
                error_confirm_mismatch: 'Пароли не совпадают',
                success: 'Пароль изменён. Теперь вы можете войти.',
                error_invalid_token: 'Недействительная или просроченная ссылка для сброса пароля.',
                error_network: 'Ошибка сети',
                page_title: 'Сброс пароля — Quoridor',
                no_token: 'Недействительная ссылка для сброса пароля.',
            },
            en: {
                title: 'Reset Password',
                password_label: 'New Password',
                confirm_label: 'Confirm Password',
                submit: 'Reset Password',
                footer: 'Back to',
                footer_link: 'Login',
                error_password_empty: 'Please enter a password',
                error_password_length: 'Must be at least 8 characters',
                error_confirm_empty: 'Please confirm your password',
                error_confirm_mismatch: 'Passwords do not match',
                success: 'Password has been reset. You can now log in.',
                error_invalid_token: 'Invalid or expired reset link.',
                error_network: 'Network error',
                page_title: 'Reset Password — Quoridor',
                no_token: 'Invalid reset link.',
            }
        };

        var resetToken = null;

        function getLang() {
            return localStorage.getItem('quoridor-lang') || 'en';
        }

        function setLanguage(lang) {
            localStorage.setItem('quoridor-lang', lang);
            var d = dict[lang];
            if (!d) return;
            document.title = d.page_title;
            document.documentElement.lang = lang;
            var el = document.getElementById('headerLang');
            if (el) el.value = lang;
            setText('pageTitle', d.title);
            setText('passwordLabel', d.password_label);
            setText('confirmLabel', d.confirm_label);
            setText('submitBtn', d.submit);
            setText('footerText', d.footer);
            setText('footerLink', d.footer_link);
        }

        function setText(id, text) {
            var el = document.getElementById(id);
            if (el) el.textContent = text;
        }

        function applyLang() {
            setLanguage(getLang());
        }

        function clearErrors() {
            document.querySelectorAll('.field-error').forEach(function(el) {
                el.classList.remove('visible');
                el.textContent = '';
            });
            document.querySelectorAll('.field-group input').forEach(function(el) {
                el.classList.remove('input-error');
            });
            var ae = document.getElementById('authError');
            ae.classList.remove('visible');
            ae.textContent = '';
        }

        function showFieldError(inputId, msg) {
            var input = document.getElementById(inputId);
            if (input) input.classList.add('input-error');
            var errEl = document.getElementById(inputId + 'Error');
            if (errEl) {
                errEl.textContent = msg;
                errEl.classList.add('visible');
            }
        }

        function showGlobalError(msg) {
            var el = document.getElementById('authError');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function submitReset(e) {
            e.preventDefault();
            clearErrors();
            var lang = getLang();
            var d = dict[lang];
            var password = document.getElementById('password').value;
            var confirm = document.getElementById('confirm').value;
            var hasError = false;

            if (!password) {
                showFieldError('password', d.error_password_empty);
                hasError = true;
            } else if (password.length < 8) {
                showFieldError('password', d.error_password_length);
                hasError = true;
            }
            if (!confirm) {
                showFieldError('confirm', d.error_confirm_empty);
                hasError = true;
            } else if (password !== confirm) {
                showFieldError('confirm', d.error_confirm_mismatch);
                hasError = true;
            }
            if (hasError) return;

            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '...';

            fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: resetToken, password: password })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    showGlobalError(data.error);
                    btn.disabled = false;
                    btn.textContent = d.submit;
                } else {
                    document.getElementById('resetForm').style.display = 'none';
                    var sm = document.getElementById('successMessage');
                    sm.textContent = d.success;
                    sm.style.display = 'block';
                    setTimeout(function() {
                        window.location.href = '/login';
                    }, 3000);
                }
            })
            .catch(function() {
                showGlobalError(d.error_network);
                btn.disabled = false;
                btn.textContent = d.submit;
            });
        }

        // Parse token from URL
        (function() {
            var params = new URLSearchParams(window.location.search);
            resetToken = params.get('token');
            if (!resetToken) {
                var d = dict[getLang()];
                document.getElementById('resetForm').style.display = 'none';
                var ae = document.getElementById('authError');
                ae.textContent = d.no_token;
                ae.classList.add('visible');
            }
        })();

        applyLang();
    </script>
</body>
</html>
