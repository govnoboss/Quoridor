services:
  redis:
    image: redis:7-alpine
    container_name: quoridor-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: quoridor
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SENTRY_DSN=${SENTRY_DSN}
      - BOTS_ENABLED=${BOTS_ENABLED:-false}
      - BOT_RANKED_ENABLED=${BOT_RANKED_ENABLED:-false}
      - BOT_FALLBACK_MIN_WAIT_MS=${BOT_FALLBACK_MIN_WAIT_MS:-15000}
      - BOT_FALLBACK_MAX_WAIT_MS=${BOT_FALLBACK_MAX_WAIT_MS:-25000}
      - BOT_MAX_ACTIVE_GAMES=${BOT_MAX_ACTIVE_GAMES:-15}
      - BOT_MOVE_MIN_DELAY_MS=${BOT_MOVE_MIN_DELAY_MS:-800}
      - BOT_MOVE_MAX_DELAY_MS=${BOT_MOVE_MAX_DELAY_MS:-2500}
      - BOT_MAX_RECENT_MATCHES=${BOT_MAX_RECENT_MATCHES:-3}
      - BOT_RECENT_WINDOW_MS=${BOT_RECENT_WINDOW_MS:-3600000}

volumes:
  redis_data:
